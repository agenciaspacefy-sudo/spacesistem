# Configuração do builder Nixpacks (Railway)
# Garante Node >= 22.5 para usar node:sqlite nativo
[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install --prefix backend && npm install --prefix frontend"]

[phases.build]
cmds = ["npm run build --prefix frontend"]

[start]
cmd = "npm start"
